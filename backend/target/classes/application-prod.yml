spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:mysql}:${MYSQLPORT:3306}/${MYSQLDATABASE:study_room_db}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}
    password: ${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:3468580094}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:init.sql
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:${REDISHOST:redis}}
      port: ${SPRING_DATA_REDIS_PORT:${REDISPORT:6379}}
      password: ${SPRING_DATA_REDIS_PASSWORD:${REDISPASSWORD:}}
      database: 0

studyroom:
  jwt:
    secret: ${STUDYROOM_JWT_SECRET:prod-secret-key-must-be-set-in-production}
    expiration: 86400000

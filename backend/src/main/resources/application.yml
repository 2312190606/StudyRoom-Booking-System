spring:
  profiles:
    active: dev
  application:
    name: study-room-backend
  main:
    banner-mode: off

server:
  port: 8080

# Actuator 监控端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

# Sentry 错误追踪
sentry:
  dsn: ${SENTRY_DSN:}
  traces-sample-rate: 0.1

# DeepSeek API 配置
ai:
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}

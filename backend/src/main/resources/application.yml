spring:
  profiles:
    active: dev
  application:
    name: study-room-backend
  main:
    banner-mode: off

server:
  port: 8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# DeepSeek API 配置
ai:
  deepseek:
    api-key: sk-987de2f40e704872b567950739efa3b5

# Actuator 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

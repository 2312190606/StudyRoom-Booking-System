openapi: 3.0.0
info:
  title: 自习室座位预约系统 API
  version: 1.0.0
  description: >
    作业：完成项目的 RESTful API 设计。
    核心资源：自习室(rooms)、座位(seats)、预约(reservations)、用户(users)等。
servers:
  - url: /api
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Result:
      type: object
      properties:
        code:
          type: integer
          example: 200
        msg:
          type: string
          example: "success"
        data:
          type: object
          nullable: true
    PageParams:
      type: object
      properties:
        page:
          type: integer
          default: 1
        size:
          type: integer
          default: 10
    UserLoginReq:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: "admin"
        password:
          type: string
          example: "123456"
    UserRegisterReq:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: "newuser"
        password:
          type: string
          example: "123456"
        phone:
          type: string
          example: "13800138000"
    Room:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "图书馆一楼自习室"
        location:
          type: string
          example: "朝阳区北京大学图书馆"
        floor:
          type: integer
          example: 1
        capacity:
          type: integer
          example: 100
        availableSeats:
          type: integer
          example: 45
        status:
          type: integer
          example: 1
    Seat:
      type: object
      properties:
        id:
          type: integer
          example: 101
        seatNo:
          type: string
          example: "A01"
        rowNo:
          type: integer
          example: 1
        colNo:
          type: integer
          example: 1
        status:
          type: integer
          description: "0-空闲, 1-占用, 2-维修中"
          example: 0
    ReservationReq:
      type: object
      required:
        - seatId
        - startTime
        - endTime
      properties:
        seatId:
          type: integer
          example: 101
        startTime:
          type: string
          format: date-time
          example: "2026-03-26T08:00:00Z"
        endTime:
          type: string
          format: date-time
          example: "2026-03-26T12:00:00Z"

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      summary: 用户注册
      tags:
        - 用户认证
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegisterReq'
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'
        '400':
          description: 参数错误

  /auth/login:
    post:
      summary: 用户登录
      tags:
        - 用户认证
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginReq'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:
                            type: string
                            example: "eyJhbGciOiJIUzI1NiIsInR5..."

  /auth/refresh:
    post:
      summary: 刷新 Token
      tags:
        - 用户认证
      responses:
        '200':
          description: 成功刷新

  /rooms:
    get:
      summary: 分页获取自习室列表
      tags:
        - 自习室与座位
      security: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 10
        - name: location
          in: query
          required: false
          schema:
            type: string
        - name: floor
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: 成功获取列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          total:
                            type: integer
                            example: 50
                          records:
                            type: array
                            items:
                              $ref: '#/components/schemas/Room'

  /rooms/{id}:
    get:
      summary: 获取自习室详情
      tags:
        - 自习室与座位
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /rooms/{id}/seats:
    get:
      summary: 获取指定自习室的座位可视化视图信息及状态
      tags:
        - 自习室与座位
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /reservations:
    post:
      summary: 提交预约请求
      tags:
        - 预约中心
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationReq'
      responses:
        '201':
          description: 成功预约

  /reservations/me:
    get:
      summary: 获取我的预约列表
      tags:
        - 预约中心
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: size
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /reservations/{id}:
    get:
      summary: 获取预约详情
      tags:
        - 预约中心
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          
  /reservations/{id}/cancel:
    put:
      summary: 取消预约
      tags:
        - 预约中心
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 取消成功
          
  /reservations/{id}/extend:
    put:
      summary: 预约延后
      tags:
        - 预约中心
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 延后成功

  /reservations/{id}/check-in:
    post:
      summary: 签到验证
      tags:
        - 预约中心
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                latitude:
                  type: number
                longitude:
                  type: number
      responses:
        '200':
          description: 签到成功

  /user/profile:
    get:
      summary: 获取个人信息
      tags:
        - 个人中心
      responses:
        '200':
          description: 获取成功
    put:
      summary: 修改个人资料
      tags:
        - 个人中心
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                avatar:
                  type: string
                phone:
                  type: string
      responses:
        '200':
          description: 修改成功

  /user/password:
    put:
      summary: 修改登录密码
      tags:
        - 个人中心
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: 修改成功

  /user/stats:
    get:
      summary: 获取学习时长统计
      tags:
        - 个人中心
      responses:
        '200':
          description: 获取成功

  /user/violations:
    get:
      summary: 获取违约记录列表
      tags:
        - 个人中心
      responses:
        '200':
          description: 获取成功

  /favorites:
    get:
      summary: 获取我的常用座位列表
      tags:
        - 常用座位配置
      responses:
        '200':
          description: 成功获取
    post:
      summary: 添加常用自习室和座位
      tags:
        - 常用座位配置
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                roomId:
                  type: integer
                seatId:
                  type: integer
      responses:
        '201':
          description: 添加成功

  /favorites/{id}:
    delete:
      summary: 取消收藏
      tags:
        - 常用座位配置
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 取消成功

  /favorites/{id}/quick-reserve:
    post:
      summary: 一键预约收藏座位
      tags:
        - 常用座位配置
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: 预约成功

  /public/carousels:
    get:
      summary: 获取首页轮播图
      tags:
        - 首页与公共信息
      security: []
      responses:
        '200':
          description: 成功

  /public/announcements:
    get:
      summary: 获取系统公告列表
      tags:
        - 首页与公共信息
      security: []
      responses:
        '200':
          description: 成功
          
  /public/announcements/{id}:
    get:
      summary: 获取公告详情
      tags:
        - 首页与公共信息
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /admin/dashboard/stats:
    get:
      summary: 获取核心数字指标
      tags:
        - 后台仪表盘
      responses:
        '200':
          description: 成功

  /admin/dashboard/utilization:
    get:
      summary: 获取座位利用率及分布数据
      tags:
        - 后台仪表盘
      responses:
        '200':
          description: 成功

  /admin/dashboard/users-trend:
    get:
      summary: 获取新增用户曲线数据
      tags:
        - 后台仪表盘
      responses:
        '200':
          description: 成功

  /admin/rooms:
    get:
      summary: 获取自习室列表(后台管理用)
      tags:
        - 后台自习室管理
      responses:
        '200':
          description: 成功
    post:
      summary: 新增自习室
      tags:
        - 后台自习室管理
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Room'
      responses:
        '201':
          description: 创建成功

  /admin/rooms/{id}:
    put:
      summary: 更新自习室信息
      tags:
        - 后台自习室管理
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Room'
      responses:
        '200':
          description: 更新成功
    delete:
      summary: 删除自习室(及批量删除)
      tags:
        - 后台自习室管理
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 删除成功

  /admin/rooms/{id}/seats/batch:
    post:
      summary: 批量新增/生成某自习室座位
      tags:
        - 后台座位管理
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: 成功

  /admin/seats/{id}:
    put:
      summary: 修改单个座位属性
      tags:
        - 后台座位管理
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /admin/seats:
    delete:
      summary: 批量删除座位
      tags:
        - 后台座位管理
      responses:
        '200':
          description: 成功

  /admin/seats/status:
    put:
      summary: 批量修改座位状态
      tags:
        - 后台座位管理
      responses:
        '200':
          description: 成功

  /admin/reservations:
    get:
      summary: 获取所有预约记录(支持高级筛选)
      tags:
        - 后台预约管理
      responses:
        '200':
          description: 成功

  /admin/reservations/{id}/cancel:
    put:
      summary: 后台强制取消预约
      tags:
        - 后台预约管理
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /admin/reservations/export:
    get:
      summary: 导出预约数据报表
      tags:
        - 后台预约管理
      responses:
        '200':
          description: 成功

  /admin/users:
    get:
      summary: 获取所有用户信息列表
      tags:
        - 后台用户管理
      responses:
        '200':
          description: 成功

  /admin/users/{id}:
    get:
      summary: 查看用户详情
      tags:
        - 后台用户管理
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          
  /admin/users/{id}/status:
    put:
      summary: 禁用/启用用户账号
      tags:
        - 后台用户管理
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /admin/announcements:
    post:
      summary: 发布新公告
      tags:
        - 后台内容管理
      responses:
        '201':
          description: 成功
          
  /admin/announcements/{id}:
    put:
      summary: 编辑系统公告
      tags:
        - 后台内容管理
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
    delete:
      summary: 删除公告
      tags:
        - 后台内容管理
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /admin/announcements/{id}/status:
    put:
      summary: 上下架公告
      tags:
        - 后台内容管理
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /admin/carousels:
    post:
      summary: 上传并添加轮播图
      tags:
        - 后台内容管理
      responses:
        '201':
          description: 成功

  /admin/carousels/sort:
    put:
      summary: 更新轮播图排序
      tags:
        - 后台内容管理
      responses:
        '200':
          description: 成功

  /admin/carousels/{id}/status:
    put:
      summary: 启用禁用轮播图
      tags:
        - 后台内容管理
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /admin/config:
    get:
      summary: 获取当前系统规则配置
      tags:
        - 后台系统配置
      responses:
        '200':
          description: 成功
    put:
      summary: 更新规则配置
      tags:
        - 后台系统配置
      responses:
        '200':
          description: 成功
